<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant · Menús</title>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&display=swap" rel="stylesheet">
<style>
  body {
    background: #1A237E;
    color: #fff;
    font: 700 12pt/1.4 'Comfortaa', cursive;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0;
    padding: 20px;
  }
  .index {
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 30px 40px;
    max-width: 600px;
    width: 100%;
    text-align: center;
  }
  .logo {
    width: 300px;
    height: auto;
    display: block;
    margin: 0 auto 2px;
  }
  .logo-fallback {
    display: none;
    font-family: 'Comfortaa', cursive;
    font-weight: 700;
    font-size: 42pt;
    color: #fff;
    letter-spacing: 4px;
    margin: 0 auto 2px;
  }
  h1 {
    font-size: 14pt;
    margin: 0 0 10px;
    letter-spacing: 3px;
  }
  .idiomas {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
    margin: 25px 0 10px;
  }
  .fila {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
  }
  .idioma {
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    padding: 10px 18px;
    min-width: 90px;
    text-align: center;
    transition: 0.3s;
  }
  .idioma:hover {
    background: rgba(255,255,255,0.18);
    transform: scale(1.03);
  }
  .idioma a {
    color: #fff;
    text-decoration: none;
    font-size: 11pt;
    display: block;
  }
  .idioma .bandera {
    font-size: 28pt;
    display: block;
    margin-bottom: 2px;
  }
  .web {
    margin-top: 25px;
    font-size: 10pt;
    opacity: 0.5;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="index">
  <img class="logo" src="img/ocean_B.png" alt="ocean" onerror="this.style.display='none'; document.querySelector('.logo-fallback').style.display='block'">
  <div class="logo-fallback">ocean</div>
  <h1>RESTAURANT</h1>

  <div class="idiomas">
    <div class="fila">
      <div class="idioma">
        <a href="es/">
          <span class="bandera">🇪🇸</span>
          Español
        </a>
      </div>
      <div class="idioma">
        <a href="ar/">
          <span class="bandera">🇲🇦</span>
          العربية
        </a>
      </div>
    </div>
    <div class="fila">
      <div class="idioma">
        <a href="fr/">
          <span class="bandera">🇫🇷</span>
          Français
        </a>
      </div>
      <div class="idioma">
        <a href="en/">
          <span class="bandera">🇬🇧</span>
          English
        </a>
      </div>
    </div>
  </div>

  <div class="web">www.ocean_resto.arcila.ma</div>
</div>

</body>
</html>
